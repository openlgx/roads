name: publish-council-layers

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps and run publish
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_PUBLISHED_BUCKET: ${{ secrets.SUPABASE_PUBLISHED_BUCKET }}
          PUBLISHER_VERSION: ${{ secrets.PUBLISHER_VERSION }}
        working-directory: backend/publish
        run: |
          if [ -z "$DATABASE_URL" ] || [ -z "$SUPABASE_SECRET_KEY" ]; then
            echo "Skipping publish: add repo secrets DATABASE_URL and SUPABASE_SECRET_KEY (and optional publish env vars) to run this job."
            exit 0
          fi
          pip install -r requirements.txt
          python publish_council_layers.py
