name: processing-backfill

on:
  workflow_dispatch: {}
  schedule:
    - cron: "15 */6 * * *"

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps and run processing worker
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_RAW_BUCKET: ${{ secrets.SUPABASE_RAW_BUCKET }}
          PROCESSING_MAX_JOBS: "5"
          PYTHONPATH: ${{ github.workspace }}
        working-directory: backend/processing
        run: |
          if [ -z "$DATABASE_URL" ] || [ -z "$SUPABASE_SECRET_KEY" ]; then
            echo "Skipping processing: add repo secrets DATABASE_URL and SUPABASE_SECRET_KEY to run this worker."
            exit 0
          fi
          pip install -r requirements.txt
          python run_processing_job.py
